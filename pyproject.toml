[project]
name = "pdfsum"
version = "0.1.0"
description = "PDFドキュメント要約CLIツール"
requires-python = ">=3.12"
dependencies = [
    "pymupdf>=1.24,<2.0",
    "httpx>=0.27,<1.0",
    "tomli-w>=1.0",
    "python-dotenv>=1.2.1",
]

[project.scripts]
pdfsum = "pdfsum.cli.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pdfsum"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.8",
    "mypy>=1.11",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
mypy_path = "src"

[[tool.mypy.overrides]]
module = "pymupdf"
ignore_missing_imports = true
